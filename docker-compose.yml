services:
  db:
    image: postgres:16-alpine
    container_name: robin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: base_trade_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d base_trade_prod"]
      interval: 5s
      timeout: 5s
      retries: 5

  ol:
    build:
      context: .
      dockerfile: Dockerfile.ol
    container_name: robin-ol
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/base_trade_prod
      DIRECT_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/base_trade_prod
      PORT: 4000
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: robin-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.paxoracapitalpro.com/api
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - ol

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: robin-admin
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.paxoracapitalpro.com/api
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      - ol

volumes:
  pgdata:
