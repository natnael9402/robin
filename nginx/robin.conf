server {
    listen 80;
    server_name paxoracapitalpro.com www.paxoracapitalpro.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name admin.paxoracapitalpro.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name api.paxoracapitalpro.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name paxoracapitalpro.com www.paxoracapitalpro.com;

    ssl_certificate /etc/letsencrypt/live/paxoracapitalpro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paxoracapitalpro.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /pp.png {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

